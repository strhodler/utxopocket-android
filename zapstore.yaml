name: UtxoPocket
summary: Privacy-first Android watch-only wallet for Bitcoin descriptors and UTXO inspection.
description: |
  UtxoPocket helps you monitor Bitcoin wallets from public descriptors without turning your phone into a signer.

  It focuses on wallet visibility, UTXO review, private Electrum connectivity, and local-first education for users who want to inspect their wallet state without exposing signing material.

  UtxoPocket is watch-only by design. It never handles seeds, private keys, WIF values, xprv/tprv values, PSBT signing, transaction construction, or transaction finalization.

  Features:
  - Import public Bitcoin descriptors by paste or QR, including receive/change pairs and BIP-389 multipath exports.
  - Monitor multiple wallets across Mainnet, Testnet3, Testnet4, and Signet.
  - Inspect balances, transactions, UTXOs, labels, value bands, age, spendability, collections, and transaction flows.
  - Import and export BIP-329 labels and encrypted watch-only backups.
  - Use Tor-by-default Electrum sync, custom onion endpoints, or explicit Local Direct mode for trusted private/local infrastructure.
  - Keep wallet data local with SQLCipher/Tink-backed storage, optional PIN, duress PIN, calculator camouflage, and panic wipe.
  - Run without analytics, crash reporters, ad SDKs, explorer lookups, or remote attribution services.
